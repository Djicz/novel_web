<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Chapter ' + ${chapter.chapterNumber} + ' - ' + ${story.title}"></title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background-color: #111;
            /* Darker background for comics */
            color: #eee;
        }
        .comic-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .comic-image {
            width: 100%;
            height: auto;
            max-width: 100%;
            display: block;
            /* Remove bottom gap */
            margin-bottom: -1px;
            /* Stitch images seamlessly if they are sliced */
        }
        .reader-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            margin: 2rem auto;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 0.5rem;
        }
        /* Fixed top bar for reading controls */
        .reader-topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(30, 41, 59, 0.95);
            border-bottom: 1px solid #334155;
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            transform: translateY(-100%);
            transition: transform 0.3s;
        }
        body.scrolled-up .reader-topbar {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="reader-topbar">
        <a th:href="@{/story/{slug}(slug=${story.slug})}" class="btn"
            style="padding: 0.25rem 0.75rem; color: #fff; border: 1px solid #fff;">← Back</a>
        <span th:text="${story.title}" style="font-weight: 600; font-size: 0.875rem;"></span>
    </div>
    <div id="progress-data" th:data-story-id="${story.id}" th:data-chapter-id="${chapter.id}" style="display: none;">
    </div>
    <div class="comic-container" id="comic-images-container">
        <script th:inline="javascript">
            const imagesJson = /*[[${chapter.images}]]*/ '[]';
            let images = [];
            try { images = JSON.parse(imagesJson); } catch (e) {
                // If not JSON, try splitting by comma
                if (imagesJson && imagesJson !== 'null') images = imagesJson.split(',');
            }
            document.addEventListener("DOMContentLoaded", () => {
                const container = document.getElementById('comic-images-container');
                images.forEach(imgUrl => {
                    const img = document.createElement('img');
                    img.src = imgUrl.trim();
                    img.className = 'comic-image';
                    container.appendChild(img);
                });
            });
        </script>
    </div>
    <div class="reader-controls">
        <button class="btn" style="color:#fff; border:1px solid #fff;" disabled>← Previous</button>
        <a th:href="@{/story/{slug}(slug=${story.slug})}" class="btn" style="color:#fff;">List</a>
        <button class="btn btn-primary">Next →</button>
    </div>
    <script th:src="@{/js/reader.js}"></script>
</body>
</html>
