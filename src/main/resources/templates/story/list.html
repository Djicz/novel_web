<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Stories - WebDocTruyen</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .story-card {
            transition: transform 0.2s;
            cursor: pointer;
            overflow: hidden;
        }
        .story-card:hover {
            transform: translateY(-4px);
        }
        .story-cover {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--border-color);
        }
        .story-info {
            padding: 1rem;
        }
        .story-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .story-meta {
            font-size: 0.875rem;
            color: var(--text-color);
            opacity: 0.7;
        }
        .filters {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border-color);
        }
    </style>
</head>
<body>
    <nav class="navbar" th:replace="~{index :: .navbar}"></nav>
    <div class="container" style="padding: 2rem 1rem;">
        <div class="flex justify-between items-center mb-4">
            <h2>All Stories</h2>
            <a th:if="${#authorization.expression('hasAnyRole(''ROLE_ADMIN'', ''ROLE_UPLOADER'')')}"
                th:href="@{/uploader/stories/new}" class="btn btn-primary">Post New Story</a>
        </div>
        <div class="filters">
            <input type="text" class="form-control" placeholder="Search by title or author..."
                style="max-width: 300px;">
            <select class="form-control" style="max-width: 200px;">
                <option value="">All Genres</option>
            </select>
            <button class="btn btn-primary">Search</button>
        </div>
        <div th:if="${#lists.isEmpty(stories)}" class="card text-center" style="padding: 3rem;">
            <h3>No stories found</h3>
            <p>Check back later or try adjusting your search filters.</p>
        </div>
        <div class="grid" th:unless="${#lists.isEmpty(stories)}">
            <a th:each="story : ${stories}" th:href="@{/story/{slug}(slug=${story.slug})}" class="card story-card"
                style="padding: 0;">
                <img th:if="${story.coverImage}" th:src="${story.coverImage}" class="story-cover" alt="Cover">
                <div th:unless="${story.coverImage}" class="story-cover flex items-center justify-center">
                    <span style="color: #94a3b8;">No Cover</span>
                </div>
                <div class="story-info">
                    <div class="story-title" th:text="${story.title}">Story Title</div>
                    <div class="story-meta flex justify-between">
                        <span th:text="${story.author}">Author</span>
                        <span th:text="${story.status}">Status</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
